{% extends 'base.html' %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
<div class="cf-page-header"><div><span class="cf-label">Resource Management</span><h2>{{ title }}</h2></div>
  <a href="{% url 'resource_list' %}" class="btn btn-cf-secondary"><span class="material-symbols-outlined me-1" style="font-size:18px;">arrow_back</span> Back</a>
</div>
<div class="row"><div class="col-lg-6"><div class="cf-card p-4">
  <form method="post" novalidate>{% csrf_token %}
    <div class="mb-3"><label class="cf-info-label mb-2">Name</label>{{ form.name }}</div>
    <div class="row mb-3"><div class="col-6"><label class="cf-info-label mb-2">Type</label>{{ form.resource_type }}</div><div class="col-6"><label class="cf-info-label mb-2">Capacity</label>{{ form.capacity }}</div></div>
    <div class="mb-3"><label class="cf-info-label mb-2">Description</label>{{ form.description }}</div>
    <div class="mb-4"><div class="form-check">{{ form.is_available }}<label class="form-check-label" style="font-weight:500;">Available</label></div></div>
    <button type="submit" class="btn btn-cf-primary"><span class="material-symbols-outlined me-1" style="font-size:18px;">save</span> Save</button>
  </form>
</div></div></div>
{% endblock %}
